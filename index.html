<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Master - 영단어 뜻 맞추기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 640px;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 2rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #6c63ff, #e91e63);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Start Screen */
#start-screen { text-align: center; }

#start-screen .desc {
  color: #aaa;
  margin-bottom: 32px;
  line-height: 1.7;
  font-size: 1.05rem;
}

.btn-start {
  background: linear-gradient(135deg, #6c63ff, #e91e63);
  border: none;
  color: white;
  padding: 16px 48px;
  font-size: 1.2rem;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
}

/* Quiz Screen */
#quiz-screen { display: none; }

.progress-bar {
  background: #1a1a2e;
  border-radius: 12px;
  height: 8px;
  margin-bottom: 16px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6c63ff, #e91e63);
  border-radius: 12px;
  transition: width 0.4s ease;
  width: 0%;
}

.quiz-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 24px;
  font-size: 0.9rem;
  color: #888;
}

.quiz-info .correct { color: #4caf50; }
.quiz-info .wrong { color: #f44336; }

.word-card {
  background: #1a1a2e;
  border-radius: 16px;
  padding: 40px 24px;
  text-align: center;
  margin-bottom: 24px;
  border: 1px solid #2a2a3e;
}

.word-card .english {
  font-size: 2.2rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
}

.word-card .pos {
  font-size: 0.9rem;
  color: #6c63ff;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option-btn {
  background: #1a1a2e;
  border: 2px solid #2a2a3e;
  color: #e0e0e0;
  padding: 16px 20px;
  font-size: 1.05rem;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.option-btn:hover:not(.disabled) {
  border-color: #6c63ff;
  background: #22223a;
}

.option-btn.correct-answer {
  border-color: #4caf50;
  background: rgba(76, 175, 80, 0.15);
  color: #4caf50;
}

.option-btn.wrong-answer {
  border-color: #f44336;
  background: rgba(244, 67, 54, 0.15);
  color: #f44336;
}

.option-btn.disabled { cursor: default; }

.option-number {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  border-radius: 50%;
  background: #2a2a3e;
  margin-right: 12px;
  font-size: 0.85rem;
  font-weight: 600;
}

.correct-answer .option-number { background: #4caf50; color: #fff; }
.wrong-answer .option-number { background: #f44336; color: #fff; }

/* Result Screen */
#result-screen { display: none; text-align: center; }

.result-card {
  background: #1a1a2e;
  border-radius: 16px;
  padding: 40px 24px;
  margin-bottom: 24px;
  border: 1px solid #2a2a3e;
}

.score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: 700;
}

.score-circle.perfect {
  background: linear-gradient(135deg, rgba(76,175,80,0.2), rgba(76,175,80,0.05));
  border: 3px solid #4caf50;
  color: #4caf50;
}

.score-circle.great {
  background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.05));
  border: 3px solid #6c63ff;
  color: #6c63ff;
}

.score-circle.good {
  background: linear-gradient(135deg, rgba(255,152,0,0.2), rgba(255,152,0,0.05));
  border: 3px solid #ff9800;
  color: #ff9800;
}

.score-circle.low {
  background: linear-gradient(135deg, rgba(244,67,54,0.2), rgba(244,67,54,0.05));
  border: 3px solid #f44336;
  color: #f44336;
}

.score-circle small {
  font-size: 0.9rem;
  font-weight: 400;
  color: #888;
}

.result-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 16px;
  font-size: 1.1rem;
}

.result-stats .stat-correct { color: #4caf50; }
.result-stats .stat-wrong { color: #f44336; }

/* Wrong list */
.wrong-section {
  text-align: left;
  margin-bottom: 24px;
}

.wrong-section h3 {
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: #f44336;
}

.wrong-list {
  background: #1a1a2e;
  border-radius: 12px;
  border: 1px solid #2a2a3e;
  overflow: hidden;
}

.wrong-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid #2a2a3e;
}

.wrong-item:last-child { border-bottom: none; }

.wrong-item .word {
  font-weight: 600;
  color: #fff;
  font-size: 1.05rem;
}

.wrong-item .meaning {
  color: #4caf50;
  font-size: 0.95rem;
  text-align: right;
  max-width: 55%;
}

.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.btn-retry {
  background: linear-gradient(135deg, #6c63ff, #e91e63);
  border: none;
  color: white;
  padding: 14px 36px;
  font-size: 1.05rem;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn-retry:hover { transform: translateY(-2px); }

.btn-retry-wrong {
  background: transparent;
  border: 2px solid #f44336;
  color: #f44336;
  padding: 14px 36px;
  font-size: 1.05rem;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
}

.btn-retry-wrong:hover {
  background: rgba(244,67,54,0.1);
  transform: translateY(-2px);
}

@media (max-width: 480px) {
  .word-card .english { font-size: 1.7rem; }
  .option-btn { font-size: 0.95rem; padding: 14px 16px; }
  h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Start -->
  <div id="start-screen">
    <h1>Word Master</h1>
    <p class="subtitle">영단어 한글 뜻 맞추기</p>
    <p class="desc">
      무작위로 선택된 30개의 영단어가 출제됩니다.<br>
      4개의 보기 중 올바른 한글 뜻을 골라주세요.<br>
      끝나면 틀린 단어를 모아 복습할 수 있습니다.
    </p>
    <button class="btn-start" onclick="startQuiz()">시작하기</button>
  </div>

  <!-- Quiz -->
  <div id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="quiz-info">
      <span id="quiz-counter">1 / 30</span>
      <span>
        <span class="correct" id="score-correct">✓ 0</span>

        <span class="wrong" id="score-wrong">✗ 0</span>
      </span>
    </div>
    <div class="word-card">
      <div class="english" id="quiz-word"></div>
    </div>
    <div class="options" id="options-container"></div>
  </div>

  <!-- Result -->
  <div id="result-screen">
    <h1>Word Master</h1>
    <p class="subtitle">결과</p>
    <div class="result-card">
      <div class="score-circle" id="score-circle">
        <span id="score-text"></span>
        <small>/ 30</small>
      </div>
      <div class="result-stats">
        <span class="stat-correct" id="final-correct"></span>
        <span class="stat-wrong" id="final-wrong"></span>
      </div>
    </div>
    <div class="wrong-section" id="wrong-section" style="display:none;">
      <h3>틀린 단어 목록</h3>
      <div class="wrong-list" id="wrong-list"></div>
    </div>
    <div class="btn-row">
      <button class="btn-retry" onclick="startQuiz()">다시 하기</button>
      <button class="btn-retry-wrong" id="btn-retry-wrong" style="display:none;" onclick="retryWrong()">틀린 단어만 다시</button>
    </div>
  </div>

</div>

  {word:"yeast",meaning:"이스트, 효모"},
  {word:"skyscraper",meaning:"고층건물"},
  {word:"inquire",meaning:"묻다"},
  {word:"spade",meaning:"삽, 스페이드"},
  {word:"vacuum",meaning:"진공, 공백"},
  {word:"migrate",meaning:"이주하다, 이동하다"},
  {word:"spectacle",meaning:"구경거리, 장관"},
  {word:"surplus",meaning:"여분, 나머지"},
  {word:"simulate",meaning:"흉내내다, 모의 실험을 하다"},

  {word:"inborn",meaning:"타고난"},
  {word:"overlap",meaning:"겹치다, 중복되다"},
  {word:"fatigue",meaning:"피곤"},
  {word:"clone",meaning:"복제, 복제품"},
  {word:"peel",meaning:"껍질을 벗기다"},
  {word:"ease",meaning:"쉬움, 편안함"},
  {word:"overcome",meaning:"극복하다"},
  {word:"fund",meaning:"자금"},

let quizWords = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongWords = [];
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(wordPool) {
  const pool = wordPool || WORDS;
  const count = Math.min(30, pool.length);
  quizWords = shuffle(pool).slice(0, count);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongWords = [];
  answered = false;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  showQuestion();
}

function retryWrong() {
  if (wrongWords.length === 0) return;
  const pool = wrongWords.map(w => ({word: w.word, meaning: w.correctMeaning}));
  startQuiz(pool);
}

function showQuestion() {
  answered = false;
  const total = quizWords.length;
  const current = quizWords[currentIndex];

  document.getElementById('quiz-counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('score-correct').textContent = `✓ ${correctCount}`;
  document.getElementById('score-wrong').textContent = `✗ ${wrongCount}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex) / total) * 100}%`;
  document.getElementById('quiz-word').textContent = current.word;

  const wrongMeanings = shuffle(WORDS.filter(w => w.meaning !== current.meaning))
    .slice(0, 3)
    .map(w => w.meaning);

  const options = shuffle([current.meaning, ...wrongMeanings]);

  const container = document.getElementById('options-container');
  container.innerHTML = '';

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-number">${i + 1}</span>${opt}`;
    btn.addEventListener('click', () => handleAnswer(btn, opt, current));
    container.appendChild(btn);
  });
}

function handleAnswer(btn, selected, current) {
  if (answered) return;
  answered = true;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => {
    b.classList.add('disabled');
    if (b.textContent.slice(1) === current.meaning || b.innerHTML.includes(current.meaning)) {
      b.classList.add('correct-answer');
    }
  });

  if (selected === current.meaning) {
    correctCount++;
    btn.classList.add('correct-answer');
  } else {
    wrongCount++;
    btn.classList.add('wrong-answer');
    wrongWords.push({ word: current.word, correctMeaning: current.meaning });
    buttons.forEach(b => {
      const text = b.textContent.substring(1);
      if (text === current.meaning) {
        b.classList.add('correct-answer');
      }
    });
  }

  document.getElementById('score-correct').textContent = `✓ ${correctCount}`;
  document.getElementById('score-wrong').textContent = `✗ ${wrongCount}`;

  setTimeout(() => {
    currentIndex++;
    if (currentIndex < quizWords.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 1000);
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = quizWords.length;
  const scoreCircle = document.getElementById('score-circle');
  document.getElementById('score-text').textContent = correctCount;

  scoreCircle.className = 'score-circle';
  if (correctCount === total) scoreCircle.classList.add('perfect');
  else if (correctCount >= total * 0.8) scoreCircle.classList.add('great');
  else if (correctCount >= total * 0.5) scoreCircle.classList.add('good');
  else scoreCircle.classList.add('low');

  document.getElementById('final-correct').textContent = `정답 ${correctCount}개`;
  document.getElementById('final-wrong').textContent = `오답 ${wrongCount}개`;

  const wrongSection = document.getElementById('wrong-section');
  const wrongList = document.getElementById('wrong-list');
  const retryBtn = document.getElementById('btn-retry-wrong');

  if (wrongWords.length > 0) {
    wrongSection.style.display = 'block';
    retryBtn.style.display = 'inline-block';
    wrongList.innerHTML = '';
    wrongWords.forEach(w => {
      const item = document.createElement('div');
      item.className = 'wrong-item';
      item.innerHTML = `<span class="word">${w.word}</span><span class="meaning">${w.correctMeaning}</span>`;
      wrongList.appendChild(item);
    });
  } else {
    wrongSection.style.display = 'none';
    retryBtn.style.display = 'none';
  }
}

document.addEventListener('keydown', (e) => {
  if (answered) return;
  const num = parseInt(e.key);
  if (num >= 1 && num <= 4) {
    const buttons = document.querySelectorAll('.option-btn');
    if (buttons[num - 1]) buttons[num - 1].click();
  }
});
</script>
